patch:
  app_options:
    com.microsoft.VSCode:
      ascii_mode: true
      reset: true
    com.microsoft.VSCodeInsiders:
      ascii_mode: true
      reset: true
    com.apple.Terminal:
      ascii_mode: true
      reset: true
    com.jetbrains.goland:
      ascii_mode: true
      reset: true
    com.jetbrains.datagrip:
      ascii_mode: true
      reset: true

  style:
    color_scheme: afreto
    font_face: "PingFang SC"
    font_point: 16
    label_font_point: 16
    line_spacing: 3
    spacing: 6
    candidate_list_layout: linear
    candidate_format: "%c %@"
    inline_preedit: true

  preset_color_schemes:
    minimal_modern_dark:
      name: "护眼极简深色／Comfort Minimal Dark"
      author: "Copilot"
      back_color: 0x202020
      border_color: 0x2C2C2C
      border_width: 8
      border_height: 8
      corner_radius: 12
      candidate_text_color: 0xD7DFD4
      comment_text_color: 0x8A9388
      label_color: 0x9BA39A
      hilited_back_color: 0x202020
      hilited_candidate_back_color: 0x3A3A3A
      hilited_candidate_text_color: 0xEEF4EC
      hilited_comment_text_color: 0xC7D0C3
      hilited_candidate_label_color: 0xEEF4EC
      text_color: 0xD7DFD4

    tokyo_night:
      name: "东京之夜／Tokyo Night"
      author: "Copilot"
      back_color: 0x261B1A
      border_color: 0x422E29
      border_width: 8
      border_height: 8
      corner_radius: 10
      candidate_text_color: 0xF5CAC0
      comment_text_color: 0x895F56
      label_color: 0x895F56
      hilited_back_color: 0x261B1A
      hilited_candidate_back_color: 0x422E29
      hilited_candidate_text_color: 0xF7A27A
      hilited_comment_text_color: 0xF79ABB
      hilited_candidate_label_color: 0xF7A27A
      text_color: 0xF5CAC0

    pastoral_green:
      name: "田园绿／Pastoral Green"
