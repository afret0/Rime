    punctuation.custom: 0
engine:
  filters:
    - simplifier
    - uniquifier
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - script_translator
key_binder:
  bindings:
    - {accept: Tab, send: Page_Down, when: composing}
    - {accept: "Shift+Tab", send: Page_Up, when: composing}
    - {accept: "Control+Shift+1", toggle: ascii_punct, when: composing}
    - {accept: "Control+Shift+2", toggle: full_shape, when: composing}
    - {accept: comma, send: Page_Down, when: composing}
    - {accept: period, send: Page_Up, when: composing}
  import_preset: default
menu:
  page_size: 5
punctuator:
  full_shape: false
  import_preset: default
recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*'?$"
    uppercase: "[A-Z][-_0-9A-Za-z]*$"
reverse_lookup:
  comment_format:
    - "xform/([nl])v/$1ü/"
  dictionary: stroke
  enable_completion: true
  preedit_format:
    - "xlit/hspnz/一丨丿丶乙/"
  prefix: "`"
  suffix: "'"
  tips: "〔筆畫〕"
schema:
  author:
    - "佛振 <chen.sst@gmail.com>"
  dependencies:
    - stroke
  description: |
    朙月拼音＋智能ABC雙拼方案。

  name: "智能ABC雙拼"
  schema_id: double_pinyin_abc
  version: 0.17
selector:
  bindings:
    ISO_Left_Tab: previous_candidate
    "Shift+Tab": previous_candidate
    Tab: next_candidate
