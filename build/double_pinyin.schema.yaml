key_binder:
  bindings:
    - {accept: Shift_L, toggle: ascii_mode, when: always}
    - {accept: Shift_R, toggle: ascii_mode, when: always}
    - {accept: Tab, send: Page_Down, when: composing}
    - {accept: "Shift+Tab", send: Page_Up, when: composing}
    - {accept: "Control+Shift+1", toggle: ascii_punct, when: composing}
    - {accept: "Control+Shift+2", toggle: full_shape, when: composing}
    - {accept: comma, send: Page_Down, when: composing}
    - {accept: period, send: Page_Up, when: composing}
  import_preset: default
menu:
  page_size: 5
punctuator:
  full_shape: false
  import_preset: default
recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*'?$"
